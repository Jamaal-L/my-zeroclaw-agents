session_timeout_secs = 3600

[security.webauthn]
enabled = false
rp_id = "localhost"
rp_name = "ZeroClaw"
rp_origin = "http://localhost:42617"

[backup]
enabled = true
max_keep = 10
include_dirs = [
    "config",
    "memory",
    "audit",
    "knowledge",
]
destination_dir = "state/backups"
compress = true
encrypt = false

[data_retention]
enabled = false
retention_days = 90
dry_run = false
categories = []

[cloud_ops]
enabled = false
